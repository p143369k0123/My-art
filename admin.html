<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Canvas Admin</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#050505;color:#fff;padding:20px}
.box{max-width:700px;margin:auto;background:#111;padding:24px;border-radius:16px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none}
button{background:#FFD700;color:#000;font-weight:bold;cursor:pointer}
#panel{display:none}
.item{display:flex;justify-content:space-between;gap:10px;background:#1a1a1a;padding:10px;margin-top:8px;border-radius:8px}
.del{width:auto;background:#d33;color:#fff}
</style>
</head>
<body>
<div class="box" id="login">
<h2>Admin Login</h2>
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="box" id="panel">
<h2>My Canvas Dashboard</h2>
<input id="title" placeholder="Artwork Title">
<input id="image" placeholder="Image URL">
<button onclick="uploadArtwork()">Upload Artwork</button>
<div id="list"></div>
</div>

<script>
const PASSWORD='oo00.in';
const DB='https://my-art-14983-default-rtdb.firebaseio.com/artworks';

function login(){
 if(document.getElementById('pass').value===PASSWORD){
   document.getElementById('login').style.display='none';
   document.getElementById('panel').style.display='block';
   loadArtworks();
 } else alert('Wrong Password');
}

async function uploadArtwork(){
 const title=document.getElementById('title').value;
 const image=document.getElementById('image').value;
 await fetch(DB+'.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,image,createdAt:Date.now()})});
 document.getElementById('title').value='';
 document.getElementById('image').value='';
 loadArtworks();
}

async function loadArtworks(){
 const r=await fetch(DB+'.json');
 const d=await r.json();
 const list=document.getElementById('list');
 list.innerHTML='';
 if(!d) return;
 Object.keys(d).reverse().forEach(k=>{
  list.innerHTML += `<div class="item"><span>${d[k].title}</span><button class="del" onclick="delArt('${k}')">Delete</button></div>`;
 });
}

async function delArt(id){
 await fetch(DB+'/'+id+'.json',{method:'DELETE'});
 loadArtworks();
}
</script>
</body>
</html>
