<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Canvas Admin</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#050505;color:#fff;padding:20px; box-sizing: border-box;}
.box{max-width:700px;margin:auto;background:#111;padding:24px;border-radius:16px;box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
h2{margin-top:0;}
input,button,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;box-sizing: border-box;}
input,select{background:#222;color:#fff;border:1px solid #333;}
input:focus,select:focus{outline:none;border-color:#F5C518;}

/* Custom File Upload Styling */
.file-input-wrapper {
  position: relative;
  margin: 12px 0;
}
.file-label {
  display: block;
  padding: 15px;
  background: #222;
  border: 2px dashed #444;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  color: #aaa;
}
.file-label:hover {
  border-color: #F5C518;
  color: #fff;
  background: #1a1a1a;
}
#imageFile {
  display: none;
}

/* IMDb Style Poster Preview with Plus (+) Ribbon Icon */
.preview-box {
  text-align: center;
  margin: 15px 0;
  display: none;
}
.poster-container {
  position: relative;
  display: inline-block;
  width: 140px;
  height: 200px;
  border-radius: 8px;
  overflow: hidden;
  border: 2px solid #F5C518;
  box-shadow: 0 4px 10px rgba(0,0,0,0.7);
}
#imgPreview {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
/* IMDb Ribbon Plus Icon */
.imdb-plus-icon {
  position: absolute;
  top: 0;
  left: 0;
  background: rgba(0, 0, 0, 0.6);
  color: #fff;
  width: 32px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
  clip-path: polygon(0 0, 100% 0, 100% 85%, 50% 100%, 0 85%);
  cursor: pointer;
  transition: background 0.2s;
}
.imdb-plus-icon:hover {
  background: rgba(245, 197, 24, 0.9);
  color: #000;
}

button{background:#FFD700;color:#000;font-weight:bold;cursor:pointer;transition:background 0.2s;}
button:hover{background:#e6c200;}
#panel{display:none}

.form-row {display:flex; gap:10px; margin:8px 0;}
.form-group {flex:1;}
.form-group label {font-size:12px; color:#aaa; display:block; margin-bottom:4px;}

.imdb-rating-box {
  background: #1a1a1a;
  padding: 12px;
  border-radius: 10px;
  border-left: 4px solid #F5C518;
  margin: 10px 0;
}
.imdb-rating-box label {
  color: #F5C518;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 5px;
}

.item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#1a1a1a;padding:12px;margin-top:8px;border-radius:8px;border:1px solid #252525;}
.item-info {flex:1;}
.item-info div {font-size:12px; color:#888; margin-top:4px;}
.btn-group {display:flex; gap:5px;}
.edit-btn {width:auto; background:#1EAA53; color:#fff; margin:0; padding:6px 12px; font-size: 14px;}
.edit-btn:hover {background:#188942;}
.del{width:auto;background:#d33;color:#fff; margin:0; padding:6px 12px; font-size: 14px;}
.del:hover {background:#b32424;}
.cancel-btn {background:#444; color:#fff; margin-top:0;}
.cancel-btn:hover {background:#333;}

/* --- Mobile / Tablet Responsiveness (100% Optimized) --- */
@media (max-width: 600px) {
  body { padding: 10px; }
  .box { padding: 16px; border-radius: 12px; }
  h2 { font-size: 20px; }
  input, button, select { padding: 10px; font-size: 14px; margin: 6px 0; border-radius: 8px; }
  .file-label { padding: 12px; font-size: 13px; }
  .form-row { flex-direction: row; gap: 8px; }
  .form-group label { font-size: 11px; }
  
  /* List items shrink on mobile */
  .item { padding: 10px; gap: 8px; flex-direction: column; align-items: flex-start; }
  .btn-group { width: 100%; justify-content: flex-end; margin-top: 5px; }
  .edit-btn, .del { padding: 6px 14px; font-size: 13px; flex: 1; text-align: center; }
  
  /* Medium adjustment for rating container */
  .imdb-rating-box { padding: 10px; }
  .poster-container { width: 110px; height: 160px; }
  .imdb-plus-icon { width: 26px; height: 32px; font-size: 18px; }
}
</style>
</head>
<body>
<div class="box" id="login">
<h2>Admin Login</h2>
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="box" id="panel">
<h2 id="form-title">My Canvas Dashboard</h2>

<input id="title" placeholder="Movie / Artwork Title">

<!-- Direct File Upload Button -->
<div class="file-input-wrapper">
  <label for="imageFile" class="file-label" id="fileLabel">📁 Click to Upload Image / Poster</label>
  <input type="file" id="imageFile" accept="image/*" onchange="previewAndConvertImage(this)">
</div>

<!-- Image Preview Box with IMDb Ribbon Style Plus Icon -->
<div class="preview-box" id="previewBox">
  <div class="poster-container">
    <div class="imdb-plus-icon">+</div>
    <img id="imgPreview" src="" alt="Preview">
  </div>
  <div style="font-size:11px; color:#aaa; margin-top:4px;">IMDb Style Live Preview</div>
</div>

<!-- Like and Dislike Section -->
<div class="form-row">
  <div class="form-group">
    <label for="likes">👍 Initial Likes</label>
    <input id="likes" type="number" value="0" min="0">
  </div>
  <div class="form-group">
    <label for="dislikes">👎 Initial Dislikes</label>
    <input id="dislikes" type="number" value="0" min="0">
  </div>
</div>

<!-- IMDb Style Rating Section -->
<div class="imdb-rating-box">
  <label>⭐ IMDb Rating</label>
  <div style="display:flex; gap:10px; align-items:center; margin-top:5px;">
    <input id="rating" type="range" min="1.0" max="10.0" step="0.1" value="7.5" oninput="document.getElementById('ratingVal').innerText = this.value">
    <span style="font-weight:bold; color:#F5C518; min-width:40px; text-align:right;"><span id="ratingVal">7.5</span>/10</span>
  </div>
</div>

<button id="submitBtn" onclick="uploadArtwork()">Upload Movie</button>
<button id="cancelEditBtn" class="cancel-btn" style="display:none;" onclick="resetForm()">Cancel Edit</button>

<hr style="border:0; border-top:1px solid #333; margin:20px 0;">
<h3>Uploaded Items List</h3>
<div id="list"></div>
</div>

<script>
const PASSWORD='oo00.in';
const DB='https://my-art-14983-default-rtdb.firebaseio.com/artworks';

let editMode = false;
let editId = null;
let globalBase64Image = ""; 

function login(){
 if(document.getElementById('pass').value===PASSWORD){
   document.getElementById('login').style.display='none';
   document.getElementById('panel').style.display='block';
   loadArtworks();
  } else alert('Wrong Password');
}

function previewAndConvertImage(input) {
  const file = input.files[0];
  if (file) {
    if(file.size > 1500000) { 
      alert("Image size thoda bada hai! Fast loading ke liye 1.5MB se choti image upload karein.");
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
      globalBase64Image = e.target.result;
      document.getElementById('imgPreview').src = e.target.result;
      document.getElementById('previewBox').style.display = "block";
      document.getElementById('fileLabel').innerText = "✅ " + file.name;
    };
    reader.readAsDataURL(file);
  }
}

async function uploadArtwork(){
 const title=document.getElementById('title').value.trim();
 const likes=parseInt(document.getElementById('likes').value) || 0;
 const dislikes=parseInt(document.getElementById('dislikes').value) || 0;
 const rating=document.getElementById('rating').value;

 if(!title) {
   alert('Please enter Movie Title');
   return;
 }
 if(!globalBase64Image) {
   alert('Please upload an Image first!');
   return;
 }

 const payload = {
   title,
   image: globalBase64Image, 
   likes,
   dislikes,
   rating,
   createdAt: Date.now()
 };

 document.getElementById('submitBtn').innerText = "Processing...";
 document.getElementById('submitBtn').disabled = true;

 try {
   if(editMode && editId) {
     await fetch(`${DB}/${editId}.json`, {
       method: 'PUT',
       headers: {'Content-Type': 'application/json'},
       body: JSON.stringify(payload)
     });
     alert('Updated successfully!');
   } else {
     await fetch(DB+'.json',{
       method:'POST',
       headers:{'Content-Type':'application/json'},
       body:JSON.stringify(payload)
     });
     alert('Uploaded successfully!');
   }
   resetForm();
   loadArtworks();
 } catch(error) {
   console.error(error);
   alert("Connection Error! Dubara koshish karein.");
 } finally {
   document.getElementById('submitBtn').disabled = false;
 }
}

function startEdit(id, title, image, likes, dislikes, rating) {
 editMode = true;
 editId = id;
 globalBase64Image = image; 
 
 document.getElementById('form-title').innerText = "Edit Movie Mode";
 document.getElementById('title').value = title;
 document.getElementById('likes').value = likes || 0;
 document.getElementById('dislikes').value = dislikes || 0;
 document.getElementById('rating').value = rating || 7.5;
 document.getElementById('ratingVal').innerText = rating || 7.5;
 
 document.getElementById('imgPreview').src = image;
 document.getElementById('previewBox').style.display = "block";
 document.getElementById('fileLabel').innerText = "🔄 Change Image (Optional)";
 
 document.getElementById('submitBtn').innerText = "Update Movie";
 document.getElementById('cancelEditBtn').style.display = "block";
 window.scrollTo({top: 0, behavior: 'smooth'});
}

function resetForm() {
 editMode = false;
 editId = null;
 globalBase64Image = "";
 document.getElementById('form-title').innerText = "My Canvas Dashboard";
 document.getElementById('title').value = '';
 document.getElementById('imageFile').value = ''; 
 document.getElementById('fileLabel').innerText = "📁 Click to Upload Image / Poster";
 document.getElementById('previewBox').style.display = "none";
 document.getElementById('imgPreview').src = "";
 document.getElementById('likes').value = '0';
 document.getElementById('dislikes').value = '0';
 document.getElementById('rating').value = '7.5';
 document.getElementById('ratingVal').innerText = '7.5';
 document.getElementById('submitBtn').innerText = "Upload Movie";
 document.getElementById('cancelEditBtn').style.display = "none";
}

async function loadArtworks(){
 const r=await fetch(DB+'.json');
 const d=await r.json();
 const list=document.getElementById('list');
 list.innerHTML='';
 if(!d) {
   list.innerHTML = '<div style="color:#666; padding:10px;">No items found.</div>';
   return;
 }
 Object.keys(d).reverse().forEach(k=>{
  const item = d[k];
  const safeTitle = item.title.replace(/'/g, "\\'");
  
  list.innerHTML += `
    <div class="item">
      <div class="item-info">
        <strong>${item.title}</strong>
        <div>⭐ ${item.rating || 'N/A'} | 👍 ${item.likes || 0} | 👎 ${item.dislikes || 0}</div>
      </div>
      <div class="btn-group">
        <button class="edit-btn" id="ed-${k}">Edit</button>
        <button class="del" onclick="delArt('${k}')">Delete</button>
      </div>
    </div>`;
    
    document.getElementById(`ed-${k}`).onclick = function() {
      startEdit(k, safeTitle, item.image, item.likes || 0, item.dislikes || 0, item.rating || '7.5');
    };
 });
}

async function delArt(id){
 if(confirm('Are you sure you want to delete this item?')) {
   await fetch(DB+'/'+id+'.json',{method:'DELETE'});
   if(editId === id) resetForm();
   loadArtworks();
 }
}
</script>
</body>
</html>
