<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>My Canvas</title><style>body{margin:0;font-family:Arial,sans-serif;background:#050505;color:#fff}header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid #222;background:#050505}a.btn{background:#FFD700;color:#000;padding:10px 18px;border-radius:999px;text-decoration:none;font-weight:bold}.hero{padding:30px}.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;padding:20px}.card{background:#111;border-radius:16px;overflow:hidden}.card img{width:100%;height:300px;object-fit:cover;cursor:pointer}.card h3{padding:12px}#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);justify-content:center;align-items:center;z-index:9999}.lightbox-content{text-align:center;position:relative}#popupImage{max-width:90vw;max-height:75vh;border-radius:15px}#closeLightbox{position:absolute;right:0;top:-45px;font-size:40px;color:#fff;cursor:pointer}#downloadBtn{display:inline-block;margin-top:20px;padding:12px 25px;background:#FFD700;color:#000;text-decoration:none;border-radius:10px;font-weight:bold}</style></head><body><header><h2>MY CANVAS</h2><a class='btn' href='admin.html'>ADMIN PANEL</a></header><div class='hero'><h1>Art Gallery</h1></div><div id='gallery' class='gallery'></div><div id='lightbox'><div class='lightbox-content'><span id='closeLightbox'>&times;</span><img id='popupImage'><br><a id='downloadBtn' download>Download Image</a></div></div><script>const DB='https://my-art-14983-default-rtdb.firebaseio.com/artworks.json';async function loadGallery(){const res=await fetch(DB);const data=await res.json();const g=document.getElementById('gallery');g.innerHTML='';if(!data){g.innerHTML='<p>No artworks yet</p>';return;}Object.keys(data).reverse().forEach(k=>{const i=data[k];g.innerHTML+=`<div class="card"><img src="${i.image}" onclick="openImage('${i.image}')"><h3>${i.title}</h3></div>`;});}function openImage(url){lightbox.style.display='flex';popupImage.src=url;downloadBtn.href=url;}document.addEventListener('click',e=>{if(e.target.id==='closeLightbox'||e.target.id==='lightbox'){lightbox.style.display='none';}});loadGallery();</script></body></html>
