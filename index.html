<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My movies</title>
        <style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#050505;
border-bottom:1px solid #222;
position:sticky;
top:0;
z-index:1000;
flex-wrap:wrap;
gap:10px;
}

.left-header{
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.logo{
font-size:22px;
font-weight:bold;
color:#fff;
}

#searchBox{
width:260px;
padding:12px;
border:none;
border-radius:10px;
background:#111;
color:#fff;
outline:none;
}

#searchBtn{
padding:12px 18px;
border:none;
border-radius:10px;
background:#FFD700;
color:#000;
font-weight:bold;
cursor:pointer;
}

.right-header{
display:flex;
gap:10px;
align-items:center;
}

.whatsapp-btn{
background:#25D366;
color:#fff;
text-decoration:none;
padding:12px 18px;
border-radius:50px;
font-weight:bold;
}

.admin-btn{
background:#FFD700;
color:#000;
text-decoration:none;
padding:12px 18px;
border-radius:50px;
font-weight:bold;
}

.hero{
height:420px;
background:url('https://i.postimg.cc/zBRPzPrf/Chat-GPT-Image-Jun-24-2026-03-21-23-AM.png') center center/cover no-repeat;
position:relative;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.hero::before{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
backdrop-filter:blur(3px);
}

.hero-content{
position:relative;
z-index:2;
text-align:center;
}

.hero-content h1{
font-size:60px;
margin-bottom:10px;
}

.hero-content p{
color:#ddd;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:16px;
padding:16px;
}

.card{
background:#111;
border-radius:16px;
overflow:hidden;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
display:block;
cursor:pointer;
}

.card h3{
padding:15px;
font-size:16px;
}

#lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
z-index:9999;
justify-content:center;
align-items:center;
backdrop-filter:blur(5px);
}

.lightbox-content{
text-align:center;
position:relative;
animation:zoomIn .3s ease;
}

#popupImage{
max-width:90vw;
max-height:75vh;
border-radius:15px;
}

#closeLightbox{
position:absolute;
top:-50px;
right:0;
font-size:40px;
cursor:pointer;
color:white;
}

#downloadBtn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#FFD700;
color:#000;
text-decoration:none;
font-weight:bold;
border-radius:10px;
}

@keyframes zoomIn{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

@media(max-width:768px){

header{
flex-direction:column;
align-items:stretch;
}

.left-header,
.right-header{
width:100%;
}

#searchBox{
width:100%;
}

.hero-content h1{
font-size:36px;
}

}
</style>
      </head>
      <body>
        <header>
          <div class="left-header">
            <div class="logo">My movie collection</div>
            <input
              type="text"
              id="searchBox"
              placeholder="Search movies Title...">
              <button id="searchBtn">
                🔍 Search
              </button>
            </div>
            <div class="right-header">
              <a
                href="https://wa.me/7704857716"
                target="_blank"
                class="whatsapp-btn">
                📱 Contact
              </a>
              <a
                href="admin.html"
                class="admin-btn">
                ADMIN PANEL
              </a>
            </div>
          </header>
          <section class="hero">
            <div class="hero-content">
              <h1>My movies</h1>
              <p>Creative movies Gallery Collection</p>
              <a
                href="https://movies4u.pn/"
                target="_blank"
                style="display:inline-block;margin-top:15px;padding:12px 25px;background:#FFD700;color:#000;text-decoration:none;font-weight:bold;border-radius:10px;">
                Visit Movies4u
              </a>
            </div>
          </section>
          <div id="gallery" class="gallery">
          </div>
          <div id="lightbox">
            <div class="lightbox-content">
              <span id="closeLightbox">&times;</span>
              <img id="popupImage">
                <br>
                  <a
                    id="downloadBtn"
                    download>
                    Download Image
                  </a>
                </div>
              </div>
              <script>

const DB =
'https://my-art-14983-default-rtdb.firebaseio.com/artworks.json';

async function loadGallery(){

try{

const response = await fetch(DB);
const data = await response.json();

const gallery =
document.getElementById('gallery');

gallery.innerHTML='';

if(!data){

gallery.innerHTML =
'<h2 style="padding:20px">No Artwork Uploaded Yet</h2>';

return;
}

Object.keys(data)
.reverse()
.forEach(key=>{

const item = data[key];

gallery.innerHTML += `
<div class="card">

<img
src="${item.image}"
alt="${item.title}"
onclick="openImage('${item.image}')">

<h3>${item.title}</h3>

</div>
`;

});

}catch(error){

console.log(error);

}

}

function openImage(imageUrl){

document.getElementById('lightbox')
.style.display='flex';

document.getElementById('popupImage')
.src=imageUrl;

document.getElementById('downloadBtn')
.href=imageUrl;

}

document
.getElementById('closeLightbox')
.onclick=function(){

document.getElementById('lightbox')
.style.display='none';

};

document
.getElementById('lightbox')
.onclick=function(e){

if(e.target.id==='lightbox'){

this.style.display='none';

}

};

function searchArtwork(){

const value =
document.getElementById('searchBox')
.value
.toLowerCase()
.trim();

const cards =
document.querySelectorAll('.card');

let found = false;

cards.forEach(card=>{

const text =
card.innerText.toLowerCase();

if(text.includes(value)){

card.style.display='block';

if(!found){

card.scrollIntoView({
behavior:'smooth',
block:'start'
});

found = true;

}

}else{

card.style.display='none';

}

});

if(value===''){

cards.forEach(card=>{
card.style.display='block';
});

}

}

document
.getElementById('searchBtn')
.addEventListener('click',searchArtwork);

document
.getElementById('searchBox')
.addEventListener('keypress',function(e){

if(e.key==='Enter'){

searchArtwork();

}

});

loadGallery();

setInterval(loadGallery,5000);

</script>
            </body>
          </html>
