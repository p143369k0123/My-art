<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My movies</title>
        <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
      }

      body{
        background:#050505;
        color:#fff;
      }

      header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:15px 20px;
        background:#050505;
        border-bottom:1px solid #222;
        position:sticky;
        top:0;
        z-index:1000;
        flex-wrap:wrap;
        gap:10px;
      }

      .left-header{
        display:flex;
        align-items:center;
        gap:10px;
        flex-wrap:wrap;
      }

      /* Logo: Highlighted with Off-White and subtle glow */
      .logo{
        font-size:22px;
        font-weight:bold;
        color:#F5F5F5; /* Off-White */
        text-shadow: 0 0 10px rgba(245, 245, 245, 0.3); /* Subtle Highlight */
      }

      /* Search Box: Off-White and Transparent */
      #searchBox{
        width:260px;
        padding:12px;
        border:1px solid rgba(245, 245, 245, 0.3);
        border-radius:10px;
        background:rgba(245, 245, 245, 0.15); /* Off-white Transparent */
        color:#fff;
        outline:none;
      }
      
      #searchBox::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }

      /* Search Button: Off-Yellow */
      #searchBtn{
        padding:12px 18px;
        border:none;
        border-radius:10px;
        background:#E6C200; /* Off-Yellow */
        color:#000;
        font-weight:bold;
        cursor:pointer;
        transition: background 0.2s;
      }
      
      #searchBtn:hover {
        background: #CCAC00;
      }

      .right-header{
        display:flex;
        gap:10px;
        align-items:center;
      }

      /* Contact Button: Off-Green */
      .whatsapp-btn{
        background:#1EAA53; /* Off-Green */
        color:#fff;
        text-decoration:none;
        padding:12px 18px;
        border-radius:50px;
        font-weight:bold;
        transition: background 0.2s;
      }
      
      .whatsapp-btn:hover {
        background: #188942;
      }

      /* Admin Panel Button: Off-Yellow */
      .admin-btn{
        background:#E6C200; /* Off-Yellow */
        color:#000;
        text-decoration:none;
        padding:12px 18px;
        border-radius:50px;
        font-weight:bold;
        transition: background 0.2s;
      }
      
      .admin-btn:hover {
        background: #CCAC00;
      }

      .hero{
        height:420px;
        background:url('https://i.postimg.cc/zBRPzPrf/Chat-GPT-Image-Jun-24-2026-03-21-23-AM.png') center center/cover no-repeat;
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
      }

      .hero::before{
        content:'';
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.55);
        backdrop-filter:blur(3px);
      }

      .hero-content{
        position:relative;
        z-index:2;
        text-align:center;
      }

      .hero-content h1{
        font-size:60px;
        margin-bottom:10px;
      }

      .hero-content p{
        color:#ddd;
      }

      .gallery{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
        gap:16px;
        padding:16px;
      }

      .card{
        background:#111;
        border-radius:16px;
        overflow:hidden;
        transition:.3s;
        cursor:pointer;
      }

      .card:hover{
        transform:translateY(-5px);
      }

      .card img{
        width:100%;
        height:320px;
        object-fit:cover;
        display:block;
        cursor:pointer;
      }

      .card h3{
        padding:15px;
        font-size:16px;
      }

      .pagination-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        padding: 40px 16px;
      }

      .page-btn {
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        background: #f5f5f5; /* Off-white color */
        color: #000;
        font-weight: bold;
        cursor: pointer;
        font-size: 15px;
        transition: background 0.2s, opacity 0.2s;
        display: inline-block;
      }

      .page-btn:hover {
        background: #e0e0e0;
      }

      .page-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      #lightbox{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.92);
        z-index:9999;
        justify-content:center;
        align-items:center;
        backdrop-filter:blur(5px);
      }

      .lightbox-content{
        text-align:center;
        position:relative;
        animation:zoomIn .3s ease;
      }

      #popupImage{
        max-width:90vw;
        max-height:75vh;
        border-radius:15px;
      }

      #closeLightbox{
        position:absolute;
        top:-50px;
        right:0;
        font-size:40px;
        cursor:pointer;
        color:white;
      }

      #downloadBtn{
        display:inline-block;
        margin-top:20px;
        padding:12px 25px;
        background:#E6C200; /* Matching Off-Yellow */
        color:#000;
        text-decoration:none;
        font-weight:bold;
        border-radius:10px;
      }

      @keyframes zoomIn{
        from{
          opacity:0;
          transform:scale(.8);
        }
        to{
          opacity:1;
          transform:scale(1);
        }
      }

      @media(max-width:768px){
        header{
          flex-direction:column;
          align-items:stretch;
        }
        .left-header,
        .right-header{
          width:100%;
        }
        #searchBox{
          width:100%;
        }
        .hero-content h1{
          font-size:36px;
        }
      }
    </style>
      </head>
      <body>
        <header>
          <div class="left-header">
            <div class="logo">My movie collection</div>
            <input type="text" id="searchBox" placeholder="Search movies Title...">
              <button id="searchBtn">🔍 Search</button>
            </div>
            <div class="right-header">
              <a href="https://wa.me/7704857716" target="_blank" class="whatsapp-btn">📱 Contact</a>
              <a href="admin.html" class="admin-btn">ADMIN PANEL</a>
            </div>
          </header>
          <section class="hero">
            <div class="hero-content">
              <h1>My movies</h1>
              <p>Creative movies Gallery Collection</p>
              <a href="https://movies4u.pn/" target="_blank" style="display:inline-block;margin-top:15px;padding:12px 25px;background:#E6C200;color:#000;text-decoration:none;font-weight:bold;border-radius:10px;">
                Visit Movies4u
              </a>
            </div>
          </section>
          <div id="gallery" class="gallery">
          </div>
          <div class="pagination-container">
            <button id="prevBtn" class="page-btn" onclick="changePage(-1)">← Back</button>
            <button id="nextBtn" class="page-btn" onclick="changePage(1)">Next →</button>
          </div>
          <div id="lightbox">
            <div class="lightbox-content">
              <span id="closeLightbox">&times;</span>
              <img id="popupImage">
                <br>
                  <a id="downloadBtn" download>Download Image</a>
                </div>
              </div>
              <script>
      const DB = 'https://my-art-14983-default-rtdb.firebaseio.com/artworks.json';
      
      let allMovies = []; 
      let currentPage = 1;
      const limitPerPage = 30;
      let isSearching = false;

      async function loadGallery(){
        if(isSearching) return; 

        try{
          const response = await fetch(DB);
          const data = await response.json();

          if(!data){
            document.getElementById('gallery').innerHTML = '<h2 style="padding:20px">No Artwork Uploaded Yet</h2>';
            return;
          }

          allMovies = Object.keys(data).reverse().map(key => data[key]);
          displayPage();
        }catch(error){
          console.log(error);
        }
      }

      function displayPage() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';

        const startIndex = (currentPage - 1) * limitPerPage;
        const endIndex = startIndex + limitPerPage;
        const paginatedMovies = allMovies.slice(startIndex, endIndex);

        if(paginatedMovies.length === 0 && currentPage > 1) {
          currentPage--;
          displayPage();
          return;
        }

        paginatedMovies.forEach(item => {
          gallery.innerHTML += `
            <div class="card">
              <img src="${item.image}" alt="${item.title}" onclick="openImage('${item.image}')">
              <h3>${item.title}</h3>
            </div>
          `;
        });

        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (endIndex >= allMovies.length);
      }

      function changePage(direction) {
        currentPage += direction;
        displayPage();
        window.scrollTo({ top: document.getElementById('gallery').offsetTop - 100, behavior: 'smooth' });
      }

      function openImage(imageUrl){
        document.getElementById('lightbox').style.display='flex';
        document.getElementById('popupImage').src=imageUrl;
        document.getElementById('downloadBtn').href=imageUrl;
      }

      document.getElementById('closeLightbox').onclick=function(){
        document.getElementById('lightbox').style.display='none';
      };

      document.getElementById('lightbox').onclick=function(e){
        if(e.target.id==='lightbox'){
          this.style.display='none';
        }
      };

      function searchArtwork(){
        const value = document.getElementById('searchBox').value.toLowerCase().trim();
        const gallery = document.getElementById('gallery');
        
        if(value === ''){
          isSearching = false;
          currentPage = 1;
          displayPage();
          return;
        }

        isSearching = true;
        const filtered = allMovies.filter(item => item.title.toLowerCase().includes(value));
        gallery.innerHTML = '';
        
        if(filtered.length === 0) {
          gallery.innerHTML = '<h2 style="padding:20px">No Matching Movies Found</h2>';
        } else {
          filtered.forEach(item => {
            gallery.innerHTML += `
              <div class="card">
                <img src="${item.image}" alt="${item.title}" onclick="openImage('${item.image}')">
                <h3>${item.title}</h3>
              </div>
            `;
          });
        }

        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').disabled = true;
      }

      document.getElementById('searchBtn').addEventListener('click', searchArtwork);
      document.getElementById('searchBox').addEventListener('keypress', function(e){
        if(e.key==='Enter'){
          searchArtwork();
        }
      });

      loadGallery();
      setInterval(loadGallery, 5000);
    </script>
            </body>
          </html>
