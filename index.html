<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Canvas</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#050505;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid #222;position:sticky;top:0;background:#050505}
a.btn{background:#FFD700;color:#000;padding:10px 18px;border-radius:999px;text-decoration:none;font-weight:bold}
.hero{padding:30px}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;padding:20px}
.card{background:#111;border-radius:16px;overflow:hidden}
.card img{width:100%;height:300px;object-fit:cover}
.card h3{padding:12px}
</style>
</head>
<body>
<header><h2>MY CANVAS</h2><a class="btn" href="admin.html">ADMIN PANEL</a></header>
<div class="hero"><h1>Art Gallery</h1></div>
<div id="gallery" class="gallery"></div>
<script>
const DB='https://my-art-14983-default-rtdb.firebaseio.com/artworks.json';
async function loadGallery(){
 const res=await fetch(DB);
 const data=await res.json();
 const g=document.getElementById('gallery');
 g.innerHTML='';
 if(!data){g.innerHTML='<p>No artworks yet</p>';return;}
 Object.keys(data).reverse().forEach(k=>{
   const i=data[k];
   g.innerHTML+=`<div class="card"><img src="${i.image}" alt=""><h3>${i.title}</h3></div>`;
 });
}
loadGallery();
setInterval(loadGallery,5000);
</script>
</body>
</html>
